# LunchClaw network policy additions.
# Layers delivery service + Playwright access on top of NemoClaw's base policy.
# Apply via: openshell policy set --policy policies/network.yaml --wait lunchclaw
#
# NemoClaw's onboard already provides: npm, telegram, github, nvidia, openclaw.
# This file adds only what LunchClaw needs on top of that.

version: 1

network_policies:
  # Delivery service access — required for hungry-cli browser automation
  delivery_service:
    name: delivery_service
    endpoints:
      - host: www.ubereats.com
        port: 443
        access: full
      - host: "*.ubereats.com"
        port: 443
        access: full
      - host: "*.uber.com"
        port: 443
        access: full
      - host: auth.uber.com
        port: 443
        access: full
      - host: "*.ubercdn.com"
        port: 443
        access: full
    binaries:
      - path: /usr/local/bin/node
      - path: /usr/bin/node
      - path: /sandbox/.cache/ms-playwright/chromium-*/chrome-linux/chrome

  # Playwright browser downloads — needed during initial setup
  playwright_setup:
    name: playwright_setup
    endpoints:
      - host: cdn.playwright.dev
        port: 443
        access: full
      - host: playwright.download.prss.microsoft.com
        port: 443
        access: full
      - host: playwright.azureedge.net
        port: 443
        access: full
      - host: storage.googleapis.com
        port: 443
        access: full
      - host: edgedl.me.gvt1.com
        port: 443
        access: full
    binaries:
      - path: /usr/local/bin/node
      - path: /usr/bin/node
